<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CIGSA — Interactive 3D Grid</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#050508;overflow:hidden;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh}
    canvas{display:block;position:fixed;top:0;left:0;z-index:1}

    /* Left panel */
    .left-panel{position:fixed;left:0;bottom:0;z-index:10;display:flex;flex-direction:column;padding:40px 48px;pointer-events:none;max-width:520px}
    .badge{display:inline-flex;align-items:center;gap:8px;padding:6px 18px;border:1px solid rgba(201,169,110,0.3);border-radius:24px;color:#c9a96e;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:32px;width:fit-content;backdrop-filter:blur(8px);background:rgba(201,169,110,0.05)}
    .badge .dot{width:6px;height:6px;border-radius:50%;background:#c9a96e;animation:blink 2s ease infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    .main-title{font-size:clamp(2.2rem,4.5vw,4.2rem);font-weight:700;line-height:1.08;margin-bottom:24px;color:#f0f4f8}
    .main-title span{background:linear-gradient(135deg,#c9a96e 0%,#dfc28e 50%,#c9a96e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    .desc{font-size:16px;color:rgba(255,255,255,0.5);line-height:1.7;margin-bottom:40px;max-width:440px}

    .btn-row{display:flex;gap:14px;pointer-events:all}
    .btn-main{padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1);text-decoration:none;display:inline-flex;align-items:center;gap:8px}
    .btn-gold{background:linear-gradient(135deg,#c9a96e,#dfc28e);color:#0a0a0a}
    .btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,169,110,0.35)}
    .btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7)}
    .btn-outline:hover{border-color:rgba(201,169,110,0.5);color:#c9a96e}

    /* Stats */
    .stats-bar{display:flex;gap:32px;margin-top:48px}
    .stat-item{display:flex;flex-direction:column;gap:2px}
    .stat-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#00c9a7}
    .stat-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);font-family:'JetBrains Mono',monospace}

    /* Top right badge */
    .top-badge{position:fixed;top:24px;right:32px;z-index:10;padding:8px 20px;border:1px solid rgba(201,169,110,0.25);border-radius:24px;color:rgba(255,255,255,0.6);font-size:12px;letter-spacing:1px;font-family:'JetBrains Mono',monospace;backdrop-filter:blur(8px);background:rgba(255,255,255,0.03);cursor:pointer;transition:all .3s ease;text-decoration:none}
    .top-badge:hover{border-color:#c9a96e;color:#c9a96e}

    @media(max-width:900px){
      .left-panel{width:100%;padding:24px;justify-content:flex-end;padding-bottom:60px;background:linear-gradient(0deg,rgba(5,5,8,0.95) 0%,rgba(5,5,8,0.6) 60%,transparent 100%)}
      .main-title{font-size:2rem}
      .desc{font-size:14px}
    }
  </style>
</head>
<body>
  <!-- Left text panel -->
  <div class="left-panel">
    <div class="badge"><span class="dot"></span> CIGSA Platform</div>
    <h1 class="main-title">Connecting<br>Oceans with<br><span>Infrastructure</span></h1>
    <p class="desc">A $8B private capital interoceanic corridor — 372 km of railway, two deep-water ports, and an integrated energy system across Guatemala.</p>
    <div class="btn-row">
      <a href="proyecto.html" class="btn-main btn-gold">Explore Project →</a>
      <a href="inversion.html" class="btn-main btn-outline">Investment</a>
    </div>
    <div class="stats-bar">
      <div class="stat-item"><span class="stat-num">372 km</span><span class="stat-lbl">Railway</span></div>
      <div class="stat-item"><span class="stat-num">17.5 m</span><span class="stat-lbl">Port Depth</span></div>
      <div class="stat-item"><span class="stat-num">$8B</span><span class="stat-lbl">Capital</span></div>
    </div>
  </div>

  <a href="equipo-contacto.html" class="top-badge">let's talk! ✦</a>

  <script type="importmap">
  {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ── CONFIG ──
    const GRID = 22;           // grid size NxN
    const SPACING = 3.2;       // gap between columns
    const BASE_H = 1.5;       // default column height
    const MAX_LIFT = 22;       // max hover lift (bigger effect)
    const RADIUS = 45;         // hover influence radius (wider area)
    const LERP = 0.07;         // animation smoothness

    const COLOR_IDLE = new THREE.Color(0x1a2a4a);   // dark steel blue
    const COLOR_ACTIVE = new THREE.Color(0x1e5aad);  // bright navy blue
    const COLOR_PEAK = new THREE.Color(0x3a8fff);    // electric blue

    // ── SCENE ──
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050508);

    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 1, 2000);
    camera.position.set(0, 65, 75);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // ── LIGHTS ──
    const ambLight = new THREE.AmbientLight(0x1a2a3a, 0.3);
    scene.add(ambLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
    dirLight.position.set(40, 80, 30);
    scene.add(dirLight);

    // ── BUILD GRID ──
    const columns = [];
    const halfGrid = (GRID - 1) * SPACING / 2;

    // Rounded box geometry helper
    const colGeo = new THREE.BoxGeometry(2.4, 1, 2.4, 1, 1, 1);

    // Edge glow material using EdgesGeometry
    for (let ix = 0; ix < GRID; ix++) {
      for (let iz = 0; iz < GRID; iz++) {
        const x = ix * SPACING - halfGrid;
        const z = iz * SPACING - halfGrid;

        // Only create columns in a rough circular/mountain shape
        const distFromCenter = Math.sqrt(x * x + z * z);
        if (distFromCenter > halfGrid * 1.05) continue;

        // Solid dark column
        const mat = new THREE.MeshStandardMaterial({
          color: 0x0c0c14,
          metalness: 0.6,
          roughness: 0.4,
        });

        const mesh = new THREE.Mesh(colGeo, mat);
        mesh.position.set(x, BASE_H / 2, z);
        mesh.scale.y = BASE_H;
        scene.add(mesh);

        // Glowing edges
        const edgesGeo = new THREE.EdgesGeometry(colGeo);
        const edgeMat = new THREE.LineBasicMaterial({
          color: COLOR_IDLE.clone(),
          transparent: true,
          opacity: 0.35,
        });
        const edges = new THREE.LineSegments(edgesGeo, edgeMat);
        mesh.add(edges);

        // Top face glow (thin plane)
        const topGeo = new THREE.PlaneGeometry(2.4, 2.4);
        const topMat = new THREE.MeshBasicMaterial({
          color: COLOR_IDLE.clone(),
          transparent: true,
          opacity: 0.08,
          side: THREE.DoubleSide,
        });
        const topPlane = new THREE.Mesh(topGeo, topMat);
        topPlane.rotation.x = -Math.PI / 2;
        topPlane.position.y = 0.51;
        mesh.add(topPlane);

        columns.push({
          mesh,
          edges,
          edgeMat,
          topMat,
          x, z,
          targetH: BASE_H,
          currentH: BASE_H,
          targetColor: COLOR_IDLE.clone(),
          currentColor: COLOR_IDLE.clone(),
          targetOpacity: 0.35,
          currentOpacity: 0.35,
        });
      }
    }

    // ── SPECIAL OBJECTS: ships and train icons on grid ──
    // Ship markers (elevated columns with special shape)
    function addShipMarker(gx, gz, label) {
      const col = columns.find(c => {
        const dx = c.x - gx, dz = c.z - gz;
        return Math.sqrt(dx*dx + dz*dz) < SPACING;
      });
      if (col) {
        col.isShip = true;
        col.label = label;
        // Make this column slightly taller at rest
        col.baseH = BASE_H * 2;
        col.targetH = col.baseH;
        col.currentH = col.baseH;
      }
    }

    function addTrainMarker(gx, gz, label) {
      const col = columns.find(c => {
        const dx = c.x - gx, dz = c.z - gz;
        return Math.sqrt(dx*dx + dz*dz) < SPACING;
      });
      if (col) {
        col.isTrain = true;
        col.label = label;
        col.baseH = BASE_H * 1.8;
        col.targetH = col.baseH;
        col.currentH = col.baseH;
      }
    }

    // Place markers at strategic grid positions
    addShipMarker(-18, -10, '🚢 CIGSA Voyager');
    addShipMarker(15, 5, '🚢 MV Pacific');
    addShipMarker(-5, 20, '🚢 Cargo Carrier');
    addTrainMarker(-8, -18, '🚂 CIGSA Express');
    addTrainMarker(10, -15, '🚂 Railway Link');

    // ── MOUSE TRACKING ──
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(9999, 9999);
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const intersectPoint = new THREE.Vector3();

    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    });

    window.addEventListener('mouseleave', () => {
      mouse.set(9999, 9999);
    });

    // ── AMBIENT WAVE ──
    function ambientWave(x, z, time) {
      return Math.sin(x * 0.08 + time * 0.5) * 0.6
           + Math.sin(z * 0.06 + time * 0.3) * 0.4
           + Math.sin((x + z) * 0.05 + time * 0.7) * 0.3;
    }

    // ── ANIMATION ──
    const clock = new THREE.Clock();
    const tempColor = new THREE.Color();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Get mouse world position
      raycaster.setFromCamera(mouse, camera);
      const hasHit = raycaster.ray.intersectPlane(groundPlane, intersectPoint);
      const mx = hasHit ? intersectPoint.x : 9999;
      const mz = hasHit ? intersectPoint.z : 9999;

      for (const col of columns) {
        const dx = col.x - mx;
        const dz = col.z - mz;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const influence = Math.max(0, 1 - dist / RADIUS);
        const eased = influence * influence * (3 - 2 * influence); // smoothstep

        // Calculate target height
        const baseH = col.baseH || BASE_H;
        const ambient = ambientWave(col.x, col.z, t);
        const hoverLift = eased * MAX_LIFT;
        col.targetH = baseH + ambient + hoverLift;

        // Lerp height
        col.currentH += (col.targetH - col.currentH) * LERP;
        col.mesh.scale.y = Math.max(0.5, col.currentH);
        col.mesh.position.y = col.currentH / 2;

        // Color interpolation based on influence
        if (eased > 0.01) {
          if (eased > 0.6) {
            tempColor.lerpColors(COLOR_ACTIVE, COLOR_PEAK, (eased - 0.6) / 0.4);
          } else {
            tempColor.lerpColors(COLOR_IDLE, COLOR_ACTIVE, eased / 0.6);
          }
          col.targetColor.copy(tempColor);
          col.targetOpacity = 0.4 + eased * 0.6;
        } else {
          col.targetColor.copy(COLOR_IDLE);
          col.targetOpacity = 0.25;
        }

        // Lerp color
        col.currentColor.lerp(col.targetColor, LERP * 1.5);
        col.currentOpacity += (col.targetOpacity - col.currentOpacity) * LERP * 1.5;

        col.edgeMat.color.copy(col.currentColor);
        col.edgeMat.opacity = col.currentOpacity;
        col.topMat.color.copy(col.currentColor);
        col.topMat.opacity = col.currentOpacity * 0.3;

        // Slight emissive on dark body
        col.mesh.material.emissive = col.currentColor;
        col.mesh.material.emissiveIntensity = col.currentOpacity * 0.08;
      }

      renderer.render(scene, camera);
    }

    animate();

    // ── RESIZE ──
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
